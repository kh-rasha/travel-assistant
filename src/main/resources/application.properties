spring.application.name=travel-assistant
server.port=8080

openai.api.key=dummy-openai-key
weather.api.key=dummy-weather-key

resilience4j.retry.instances.openAiApi.max-attempts=3
resilience4j.retry.instances.openAiApi.wait-duration=1s

resilience4j.retry.instances.weatherApi.max-attempts=3
resilience4j.retry.instances.weatherApi.wait-duration=1s

resilience4j.circuitbreaker.instances.openAiApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openAiApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.openAiApi.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.instances.weatherApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.weatherApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.weatherApi.wait-duration-in-open-state=10s